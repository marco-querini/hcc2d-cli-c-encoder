# Shell-style configuration for the self-hosted APT repository.
# Override any value via environment variables in CI or local publish jobs.

APT_REPO_ORIGIN="${APT_REPO_ORIGIN:-HCC2D}"
APT_REPO_LABEL="${APT_REPO_LABEL:-HCC2D APT Repository}"
APT_REPO_DESCRIPTION="${APT_REPO_DESCRIPTION:-Official HCC2D packages for Debian and Ubuntu}"
APT_REPO_COMPONENTS="${APT_REPO_COMPONENTS:-main}"
APT_REPO_ARCHITECTURES="${APT_REPO_ARCHITECTURES:-amd64}"
APT_REPO_DISTRIBUTIONS="${APT_REPO_DISTRIBUTIONS:-bookworm trixie jammy noble}"
APT_REPO_POOL_PREFIX="${APT_REPO_POOL_PREFIX:-pool}"
APT_REPO_OUTPUT_DIR="${APT_REPO_OUTPUT_DIR:-apt-repo/public}"
APT_REPO_TMP_DIR="${APT_REPO_TMP_DIR:-apt-repo/tmp}"
APT_REPO_KEYRING_OUTPUT="${APT_REPO_KEYRING_OUTPUT:-apt-repo/public/hcc2d-archive-keyring.gpg}"

# Set this to your signing key fingerprint or long key ID when publishing
# for real. Leave empty for metadata-only dry runs with --skip-signing.
APT_REPO_GPG_KEY="${APT_REPO_GPG_KEY:-4DCDC5549D1955166EE3E83A567381E2B0354085}"
